<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Admin - Post Manager</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="container">
      <header>
        <h1>Post Manager</h1>
        <p>Sign in with the admin account to create and edit content.</p>
      </header>
      <section id="login-section">
        <form id="login-form" class="panel">
          <h2>Sign In</h2>
          <label>
            Username
            <input type="text" name="username" required autocomplete="username" value="admin">
          </label>
          <label>
            Password
            <input type="password" name="password" required autocomplete="current-password" value="123123123">
          </label>
          <button type="submit">Sign In</button>
          <p class="form-status" id="login-status"></p>
        </form>
      </section>
      <section id="admin-section" class="hidden">
        <div class="panel split">
          <form id="post-form">
            <h2 id="form-title">Add Post</h2>
            <input type="hidden" name="id" id="post-id">
            <label>
              Title
              <input type="text" name="title" id="post-title" required>
            </label>
            <label>
              Slug (optional)
              <input type="text" name="slug" id="post-slug" placeholder="custom-slug">
            </label>
            <label>
              Short description
              <textarea name="description" id="post-description" rows="2"></textarea>
            </label>
            <label>
              Content
              <textarea name="content" id="post-content" rows="6"></textarea>
            </label>
            <label>
              Preview image (URL)
              <input type="url" name="previewImage" id="post-preview">
            </label>
            <div class="actions">
              <button type="submit">Save</button>
              <button type="button" id="cancel-edit" class="ghost hidden">Cancel</button>
            </div>
            <p class="form-status" id="post-status"></p>
          </form>
          <div class="post-list">
            <div class="post-list__header">
              <h2>Existing Posts</h2>
              <button type="button" id="logout-btn" class="ghost">Sign Out</button>
            </div>
            <ul id="posts"></ul>
          </div>
        </div>
      </section>
    </main>
    <script src="/admin.js" type="module"></script>
  </body>
</html>
